
services:
  frontend:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - ./client/.env

  backend:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: